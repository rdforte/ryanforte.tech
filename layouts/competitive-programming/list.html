<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ .Title }}</title>

		<!-- css -->
		<link rel="stylesheet" href="/assets/main.css" />

		<!-- javascript -->
		<script type="text/javascript" src="/assets/bundle.js" defer></script>
	</head>
	<body class="bg-gray-800">
		{{- partial "header.html" . -}}
		<div class="page-gutter">
			<h1 class="sm:text-5xl text-white font-bold text-4xl text-left mt-8">
				{{.Title}}
			</h1>
			<div class="grid grid-cols-1 gap-4 mt-8 mb-8">
				<!-- Blog Posts -->
				{{ range .Pages.ByDate.Reverse }}
				<a href="{{.Permalink}}">
					<div
						class="p-4 rounded-lg flex items-center justify-center bg-slate-200"
					>
						<img
							src="/default/leetcode.png"
							class="rounded-lg h-12 aspect-square mr-4"
						/>
						<div class="text-xl text-white font-semibold w-full text-slate-800">
							{{.Title}}
						</div>
					</div>
				</a>
				{{ end }}
			</div>
		</div>
	</body>
</html>
