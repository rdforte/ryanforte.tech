<!-- image-loader -->
<!-- responsible for loading an image and handling the default loading and error states -->
<!-- takes two parameters id and src which can be passed via a dict -->
<!-- example: (dict "id" .Params.HeaderImageId "src" .Params.HeaderImage) -->
<script defer>
	;(() => {
		const image = document.getElementById('{{.id}}')
		const downloadingImage = new Image()
		downloadingImage.onload = el => {
			const src = el?.composedPath()?.[0]?.src
			if (src) {
				image.src = src
			}
			image.classList.remove('animate-pulse')
		}

		downloadingImage.onerror = () => {
			image.src = '/default/image-load-error.gif'
			image.classList.remove('animate-pulse')
		}

		downloadingImage.src = '{{.src}}'
	})()
</script>
