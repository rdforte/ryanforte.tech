<!-- This example requires Tailwind CSS v2.0+ -->
<nav class="bg-gray-800">
	<div class="mx-auto px-2 sm:px-6 lg:px-8">
		<div class="relative flex items-center h-20 justify-between">
			<a
				id="header-logo"
				class="w-11 slide-down-animation"
				style="animation-delay: 0s"
				href="/"
				>{{ partial "logo" . }}</a
			>
			<div class="flex space-x-4">
				<a
					id="nav-bar__home-link"
					href="/"
					class="text-gray-300 hover:text-red-400 px-3 py-2 text-sm font-medium slide-down-animation hidden lg:block"
					style="animation-delay: 0.2s"
					>Home</a
				>
				<a
					id="nav-bar__blog-link"
					href="/blog"
					class="text-gray-300 hover:text-red-400 px-3 py-2 text-sm font-medium slide-down-animation hidden lg:block"
					style="animation-delay: 0.4s"
					>Blog</a
				>
				<a
					id="nav-bar__cp-link"
					href="/competitive-programming/show-all"
					class="text-gray-300 hover:text-red-400 px-3 py-2 text-sm font-medium slide-down-animation hidden lg:block"
					style="animation-delay: 0.6s"
					>Competitive</a
				>
			</div>
			<button
				id="hamburger"
				class="w-9 lg:hidden cursor-pointer flex flex-col justify-between h-6 hamburger z-20"
			>
				<div
					class="w-full h-1 bg-white hamburger__bar-one hamburger__bar-one--is-not-active rounded slide-down-animation"
					style="animation-delay: 0.6s"
				></div>
				<div
					class="w-full h-1 bg-white hamburger__bar-two hamburger__bar-two--is-not-active rounded slide-down-animation"
					style="animation-delay: 0.4s"
				></div>
				<div
					class="w-full h-1 bg-white hamburger__bar-three hamburger__bar-three--is-not-active rounded slide-down-animation"
					style="animation-delay: 0.2s"
				></div>
			</button>
		</div>
	</div>
	<div
		id="mobile-navigation-window"
		class="mobile-navigation top-0 left-full w-screen h-screen absolute z-10 bg-zinc-900 flex flex-col content-center px-5"
	>
		<a
			id="hamburger-bar__home-link"
			href="/"
			class="text-gray-300 hover:text-red-400 p-5 text-md font-medium lg:block bg-zinc-700 rounded-md w-80 text-center mx-auto mt-auto"
			>Home</a
		>
		<a
			id="hamburger-bar__blog-link"
			href="/blog"
			class="text-gray-300 hover:text-red-400 p-5 text-md font-medium lg:block bg-zinc-700 mt-3 rounded-md w-80 text-center mx-auto"
			>Blog</a
		>
		<a
			id="hamburger-bar__cp-link"
			href="/competitive-programming/show-all"
			class="text-gray-300 hover:text-red-400 p-5 text-md font-medium lg:block bg-zinc-700 mt-3 rounded-md w-80 text-center mx-auto mb-auto"
			>Competitive</a
		>
	</div>
</nav>
